{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Enseignant | IBAM</title>
    
    <!-- CDN Bootstrap 4 officiel et complet -->
    <link rel="stylesheet" href="https://jsdelivr.net" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    
    <!-- CDN FontAwesome pour charger toutes vos icônes (Calendrier, Cloud, Clé, etc.) -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <!-- BARRE LATÉRALE ENSEIGNANT -->
        <div class="bg-dark text-white p-3" id="sidebar-wrapper" style="min-width: 250px; min-height: 100vh;">
            <div class="sidebar-heading text-center py-4 text-warning font-weight-bold border-bottom border-secondary">
                IBAM ENSEIGNANT
                <div class="badge badge-success d-block mt-2 small">Espace Professeur</div>
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    <i class="fas fa-chalkboard-teacher mr-2 text-success"></i> Mon Espace
                </a>
            </div>
        </div>

        <!-- CONTENU PRINCIPAL -->
        <div id="page-content-wrapper" class="w-100 p-4">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- Scripts JavaScript complets indispensables pour l'interactivité des onglets -->
    <script src="https://jsdelivr.net" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
