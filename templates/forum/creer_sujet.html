{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-3 p-4 bg-white" style="border-top: 4px solid #004d26 !important;">
                <h3 class="font-weight-bold mb-4" style="color: #004d26;">
                    <i class="fas fa-plus-circle mr-2"></i> Ouvrir une nouvelle discussion
                </h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="form-group mb-3">
                            <label class="font-weight-bold small text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'forum:index' %}" class="btn btn-outline-secondary rounded-pill px-4">Annuler</a>
                        <button type="submit" class="btn text-white font-weight-bold rounded-pill px-4" style="background-color: #004d26;">
                            Publier sur le Forum
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
